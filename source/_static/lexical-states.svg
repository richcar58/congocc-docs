<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200" font-family="sans-serif" font-size="14" role="img" aria-label="Lexical state machine for line comments: DEFAULT switches to COMMENT on a hash character, stays in COMMENT on any non-newline character, and returns to DEFAULT on a newline">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#555"/>
    </marker>
  </defs>
  <line x1="32" y1="100" x2="78" y2="100" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <g fill="#eef3fb" stroke="#3b6ea5" stroke-width="1.5">
    <circle cx="130" cy="100" r="48"/>
    <circle cx="420" cy="100" r="48"/>
  </g>
  <g fill="#1a1a1a" text-anchor="middle" font-weight="bold">
    <text x="130" y="105">DEFAULT</text>
    <text x="420" y="105">COMMENT</text>
  </g>
  <g fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#a)">
    <path d="M173,74 Q275,40 377,74"/>
    <path d="M377,126 Q275,160 173,126"/>
    <path d="M462,80 Q524,100 462,120"/>
  </g>
  <g fill="#1a1a1a" text-anchor="middle">
    <text x="275" y="42">"#"</text>
    <text x="275" y="176">"\n"</text>
    <text x="508" y="104" text-anchor="start">~["\n"]</text>
  </g>
</svg>
